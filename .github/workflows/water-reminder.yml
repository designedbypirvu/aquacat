name: Water Reminder Cron

on:
  schedule:
    # Runs every 10 minutes to ensure timely push notifications
    - cron: '*/10 * * * *'
  workflow_dispatch: # also allow manual trigger from GitHub Actions UI

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger push notifications
        run: |
          curl --fail --silent --show-error \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_APP_URL }}/api/cron"
